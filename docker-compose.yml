services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      agent:
        condition: service_healthy

  agent:
    build: ./agent
    container_name: personal-agent
    restart: unless-stopped
    expose:
      - "8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - agent-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  bridge:
    build: ./bridge
    container_name: whatsapp-bridge
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - AGENT_URL=http://agent:8000
    volumes:
      - bridge-auth:/app/auth
    depends_on:
      agent:
        condition: service_healthy

volumes:
  bridge-auth:
  agent-data:
  caddy-data:
  caddy-config:
